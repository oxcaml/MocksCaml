# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: Nix Flake Actions (trusted)

on:
  push:
    branches:
      - main
  merge_group:

permissions: {}

jobs:
  nix-matrix:
    name: Generate Nix build matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install
      - id: set-matrix
        name: Generate Nix Matrix
        run: |
          set -Eeuo pipefail
          echo -n 'matrix=' >> "$GITHUB_OUTPUT"
          nix eval --json '.#githubActions.matrix' | tee -a "$GITHUB_OUTPUT"

  # Trusted counterpart of nix-build in nix-github-actions.yml: only
  # main and the merge queue reach this workflow, and only those refs
  # may hold the `mockscaml` cachix write token (see the cache policy
  # comment in that file). The token lives in the `cachix` deployment
  # environment, whose branch policy allows only those refs -- keep this
  # workflow's triggers and the job's `if:` in sync with that policy,
  # or gated runs fail instead of skipping. The job keeps the same
  # display name template as the untrusted job so the resulting check
  # names are identical in every context.

  nix-build-trusted:
    name: ${{ matrix.name }} (${{ matrix.system }})
    needs: nix-matrix
    if: github.event_name == 'merge_group' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{fromJSON(needs.nix-matrix.outputs.matrix)}}

    permissions:
      contents: read

    # Scopes CACHIX_AUTH_TOKEN to main and merge-queue refs.
    environment: cachix

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install

      - name: Set up cache (read/write)
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mockscaml
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - env:
          ATTR: ${{ matrix.attr }}
        run: nix build -L ".#$ATTR"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
