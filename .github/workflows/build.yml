# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: build
on:
  push:
    branches:
      - main
      - '*microbranch'
    tags:
      - '*'
  pull_request:
  merge_group:
permissions: {}
jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read # the "Print diff artifact URL" step reads workflow artifacts via `gh api`

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default (x86_64-linux)
            os: ubuntu-latest

          - name: O3 metrics (x86_64-linux)
            os: ubuntu-latest
            build_ocamlparam: '_'
            # In oxcaml this is '_,O3=1'; the mock installs a stock compiler,
            # so use a vanilla-safe OCAMLPARAM instead.
            ocamlparam: '_,w=-46'
            # The metrics pipeline (instrumentation, install, collection) runs
            # on every event so that breakage surfaces before merging; the
            # artifact upload and the push to the metrics repo happen only on
            # pushes to main (see the push-metrics job).
            collect_metrics: true
            disable_testcases: 'testsuite/tests/disabled/*.ml'

          # We use a custom install prefix for this workflow.
          # Consider renaming it to indicate as such when convenient.
          - name: dev (x86_64-linux)
            config: --enable-dev --enable-keyword-edition=5.2
            os: ubuntu-latest
            install_path: _custom_install

          - name: cfg-invariants (aarch64-linux)
            os: ubuntu-24.04-arm
            # In oxcaml this is
            # '_,w=-46,regalloc=cfg,cfg-invariants=1,cfg-eliminate-dead-trap-handlers=1'.
            build_ocamlparam: '_,w=-46'
            ocamlparam: '_,w=-46'

          - name: regalloc (aarch64-darwin)
            config: --disable-warn-error
            os: macos-latest
            # In oxcaml this is
            # '_,w=-46,save-ir-before=register_allocation,verify-binary-emitter=1'.
            build_ocamlparam: '_,w=-46'
            ocamlparam: '_,w=-46'

    env:
      J: "8"
      run_testsuite: "true"

    steps:
      - name: Checkout the MocksCaml repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Runner information
        if: runner.os == 'Linux'
        run: |
          # There have been times where we have trouble with response times from
          # azure.archive.ubuntu.com - uncomment if needed:
          # sudo sed -i -e '/azure.archive.ubuntu.com/s/^/#/' /etc/apt/apt-mirrors.txt
          cat /etc/apt/apt-mirrors.txt || true

      - name: Install autoconf (macOS)
        if: runner.os == 'macOS'
        run: HOMEBREW_NO_INSTALL_CLEANUP=TRUE brew install autoconf

      - name: Pretend we're running in a container (makes setup-ocaml go faster)
        if: runner.os == 'Linux'
        run: sudo touch /.dockerenv
        # makes setup-ocaml skip apt-get, which is slow on first invocation

      - name: Set up Opam
        uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3.6.1
        with:
          ocaml-compiler: oxcaml-ci-deps.5.4.0-with-ocaml.5.4.0-with-ocamlformat.0.29.0
          opam-repositories: |
            local: file://${{ github.workspace }}/tools/ci/local-opam
            default: https://github.com/ocaml/opam-repository.git
          opam-disable-sandboxing: true
          opam-pin: false

      - name: Set up Opam environment
        # this command adds the opam environment to the PATH.
        run: |
          opam env --set-root --set-switch --shell=cmd | sed -n 's/^set //p' | tee -a "$GITHUB_ENV"

      - name: Disable any testcases
        env:
          DISABLE_TESTCASES: ${{ matrix.disable_testcases }}
        run: |
          disable_testcases="$DISABLE_TESTCASES"
          if [ -n "$disable_testcases" ]; then
            rm -fv $disable_testcases
          fi

      - name: Configure MocksCaml
        env:
          MATRIX_CC: ${{ matrix.cc }}
          INSTALL_PATH: ${{ matrix.install_path }}
          MATRIX_CONFIG: ${{ matrix.config }}
        run: |
          if [[ -n "$MATRIX_CC" ]]; then
            export CC="$MATRIX_CC"
          fi
          if [[ -n "$INSTALL_PATH" ]]; then
            install_path="$INSTALL_PATH"
          else
            install_path="_install"
          fi
          autoconf
          # $MATRIX_CONFIG is deliberately unquoted: word-splitting is
          # intended (it is a whitespace-separated list of configure flags).
          ./configure \
            --prefix=$GITHUB_WORKSPACE/$install_path \
            $MATRIX_CONFIG

      - name: Setup for saving core files (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir /cores
          sudo chmod 777 /cores
          # Core filenames will be of the form executable.pid.timestamp:
          sudo bash -c 'echo "/cores/%e.%p.%t" > /proc/sys/kernel/core_pattern'

      - name: Setup for saving core files (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo chmod 1777 /cores
          sudo sysctl kern.coredump=1
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.get-task-allow bool true" /tmp/core.entitlements
          # Find opam's OCaml installation
          OCAML_BIN=$(opam var bin)
          codesign -s - -f --entitlements /tmp/core.entitlements $OCAML_BIN/ocamlc.opt
          codesign -s - -f --entitlements /tmp/core.entitlements $OCAML_BIN/ocamlopt.opt

      - name: Build MocksCaml
        id: build
        run: |
          if [ "$COLLECT_METRICS" = "true" ]; then
            mkdir $GITHUB_WORKSPACE/_profile_csv
            BUILD_OCAMLPARAM="$BUILD_OCAMLPARAM,dump-dir=$GITHUB_WORKSPACE/_profile_csv,dump-into-csv=1,profile=1"
            OCAMLPARAM="$OCAMLPARAM,dump-dir=$GITHUB_WORKSPACE/_profile_csv,dump-into-csv=1,profile=1"
          fi
          ulimit -c unlimited
          make compiler \
            || (if [ "$expected_fail" = true ]; then exit 0; else exit 1; fi);
        env:
          COLLECT_METRICS: ${{ matrix.collect_metrics }}
          BUILD_OCAMLPARAM: ${{ matrix.build_ocamlparam }}
          OCAMLPARAM: ${{ matrix.ocamlparam }}
          OCAMLRUNPARAM: ${{ matrix.ocamlrunparam }}
          USE_RUNTIME: ${{ matrix.use_runtime }}

      - name: Run MocksCaml testsuite
        if: steps.build.conclusion == 'success' && always()
        run: |
          if [ "$COLLECT_METRICS" = "true" ]; then
            BUILD_OCAMLPARAM="$BUILD_OCAMLPARAM,dump-dir=$GITHUB_WORKSPACE/_profile_csv,dump-into-csv=1,profile=1"
            OCAMLPARAM="$OCAMLPARAM,dump-dir=$GITHUB_WORKSPACE/_profile_csv,dump-into-csv=1,profile=1"
          fi
          ulimit -c unlimited
          make test \
            || (if [ "$expected_fail" = true ]; then exit 0; else exit 1; fi);
        env:
          COLLECT_METRICS: ${{ matrix.collect_metrics }}
          BUILD_OCAMLPARAM: ${{ matrix.build_ocamlparam }}
          OCAMLPARAM: ${{ matrix.ocamlparam }}
          OCAMLRUNPARAM: ${{ matrix.ocamlrunparam }}
          USE_RUNTIME: ${{ matrix.use_runtime }}

        # Install the compiler for metrics_collection configuration to populate _install directory
        # This is needed for the metrics collection step to analyze installed artifacts
      - name: Reinstall the compiler for metrics collection
        if: matrix.collect_metrics == true
        run: make install
        env:
          BUILD_OCAMLPARAM: ${{ matrix.build_ocamlparam }}
          OCAMLPARAM: ${{ matrix.ocamlparam }}
          OCAMLRUNPARAM: ${{ matrix.ocamlrunparam }}
          USE_RUNTIME: ${{ matrix.use_runtime }}

      - name: Promote failed tests and capture diffs
        # Compute the diff for an arbitrary job, we expect all to have the same diff
        if: failure() && matrix.name == 'default (x86_64-linux)'
        continue-on-error: true
        run: |
          make promote-failed
          if ! git diff --quiet; then
            git diff > $GITHUB_WORKSPACE/test-diffs.patch
            echo "Test output differences detected and saved to artifact"
            echo "DIFF_CREATED=true" >> $GITHUB_ENV
          else
            echo "No test output differences found"
            echo "DIFF_CREATED=false" >> $GITHUB_ENV
          fi

      - name: Upload test diffs
        if: failure() && env.DIFF_CREATED == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        continue-on-error: true
        with:
          name: test-diffs-${{ github.sha }}-${{ github.run_id }}-${{ matrix.name }}
          path: ${{ github.workspace }}/test-diffs.patch

      - name: Print diff artifact URL
        if: failure() && env.DIFF_CREATED == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_NAME: ${{ matrix.name }}
        run: |
          ARTIFACT_NAME="test-diffs-$GITHUB_SHA-$GITHUB_RUN_ID-$MATRIX_NAME"
          # Wait a moment for artifact to be registered
          sleep 5
          # Get artifact URL from GitHub API
          ARTIFACT_URL=$(gh api repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts \
            --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .archive_download_url")
          if [ -n "$ARTIFACT_URL" ]; then
            COMMAND="./tools/apply-diff.sh $ARTIFACT_URL"
            echo "$COMMAND"
          else
            echo "Artifact uploaded but URL not yet available. Check: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi

      - name: Collect metrics
        if: matrix.collect_metrics == true
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/_metrics_output"
          # CSV filename and PR number are computed inside the script
          python3 "$GITHUB_WORKSPACE/scripts/collect-metrics.py" \
            --install-dir "$GITHUB_WORKSPACE/_install" \
            --output-dir "$GITHUB_WORKSPACE/_metrics_output" \
            --commit-hash "$GITHUB_SHA" \
            --commit-message "$COMMIT_MESSAGE" \
            --profile-dir "$GITHUB_WORKSPACE/_profile_csv" \
            --verbose
          # The script only warns when profiling produced no CSVs (it then
          # skips the profiles archive); fail loudly so a silently broken
          # profile=1 pipeline is caught before merging.
          ls "$GITHUB_WORKSPACE"/_metrics_output/profiles-*.tar.gz

      - name: Upload metrics artifact
        # Only pushes to main upload: the artifact exists solely as the
        # handoff to the push-metrics job.
        if: matrix.collect_metrics == true && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: metrics-${{ github.sha }}-${{ github.run_id }}
          path: ${{ github.workspace }}/_metrics_output

      - name: Upload core dumps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: cores-${{ github.sha }}-${{ github.run_id }}-${{ matrix.name }}
          path: /cores

      - name: Upload DiagnosticReports (macOS)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure() && runner.os == 'macOS'
        with:
          name: DiagnosticReports-${{ github.sha }}-${{ github.run_id }}-${{ matrix.name }}
          path: /Users/runner/Library/Logs/DiagnosticReports

  push-metrics:
    name: Push metrics
    runs-on: ubuntu-latest
    needs: build
    # !cancelled(): push metrics whenever the O3 metrics leg produced data,
    # even if an unrelated matrix leg failed.
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    # The METRICS_REPO_TOKEN secret is scoped to this deployment environment,
    # which restricts it to deployments from main.
    environment: metrics
    steps:
      - name: Download metrics artifact
        id: download
        # The artifact is absent if the O3 metrics leg failed; skip the push then.
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: metrics-${{ github.sha }}-${{ github.run_id }}
          path: metrics-data

      - name: Push metrics to oxcaml/oxcaml-metrics (DRY RUN)
        if: steps.download.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.METRICS_REPO_TOKEN }}
        run: |
          # Let git authenticate through gh (which uses GH_TOKEN)
          gh auth setup-git
          # DRY RUN: this is MocksCaml, so build the commit in a local scratch
          # repo instead of cloning and pushing to oxcaml/oxcaml-metrics.
          mkdir metrics-repo
          cd metrics-repo
          git init -q -b main
          mkdir -p raw-data
          cp ../metrics-data/* raw-data/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw-data/
          git commit -m "Add metrics for commit ${GITHUB_SHA}"
          echo "DRY RUN: would 'git push' this commit to oxcaml/oxcaml-metrics:"
          git show --stat HEAD
          if [ -n "$GH_TOKEN" ]; then
            echo "DRY RUN: METRICS_REPO_TOKEN is present"
          else
            echo "DRY RUN: METRICS_REPO_TOKEN is EMPTY"
          fi

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
