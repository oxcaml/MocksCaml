# CYBERSECURITY WARNING: DO NOT give workflows write permission to any source code repo.
# If you want this functionality, ask for help from a subset of:
# @jvanburen @glittershark @mshinwell
name: Nix Flake Actions

on:
  push:
    branches:
      - '*microbranch'
    tags:
      - '*'
  pull_request:

permissions: {}

jobs:
  nix-matrix:
    name: Generate Nix build matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install
      - id: set-matrix
        name: Generate Nix Matrix
        run: |
          set -Eeuo pipefail
          echo -n 'matrix=' >> "$GITHUB_OUTPUT"
          nix eval --json '.#githubActions.matrix' | tee -a "$GITHUB_OUTPUT"

  # The `mockscaml` cachix cache is a CI-only optimization, NOT a
  # distribution channel: internal builds are always from source, and
  # nothing outside GitHub CI should consume these binaries. Do not add
  # the cache as a substituter in flake.nix or otherwise encourage
  # non-CI use. The cache is disposable: if it is ever suspect, wipe it
  # and CI falls back to building from source.
  #
  # This workflow builds untrusted refs only -- PRs (same-repo or fork)
  # and non-main pushes such as microbranches and tags -- and must run
  # without the cache write token in the job at all: `nix build`
  # executes build scripts controlled by that code, and unreviewed code
  # must never be able to populate a cache that later CI runs consume.
  # Trusted refs (main and the merge queue) are built with the write
  # token by nix-github-actions-trusted.yml instead; the trusted/
  # untrusted split is done at the trigger level (rather than with
  # job-level `if:` on twin jobs) so that neither workflow ever carries
  # a skipped matrix job, whose display name would show up as a
  # placeholder check with the unexpanded "matrix.name" template.

  nix-build:
    name: ${{ matrix.name }} (${{ matrix.system }})
    needs: nix-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix: ${{fromJSON(needs.nix-matrix.outputs.matrix)}}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          # Pin to nix 2.33.0; later versions of nix cause out of memory issues
          # on darwin
          install_url: https://releases.nixos.org/nix/nix-2.33.0/install

      - name: Set up cache (read-only)
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          # Public caches are readable without credentials.
          name: mockscaml

      - env:
          ATTR: ${{ matrix.attr }}
        run: nix build -L ".#$ATTR"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
